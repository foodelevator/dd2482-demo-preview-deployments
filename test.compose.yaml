services:
  test:
    labels:
      - traefik.enable=true
      - traefik.http.routers.test-${PR}.rule=Host(`${PR}.devops-demo.0m.nu`)
      - traefik.http.routers.test-${PR}.entrypoints=http
    build:
      context: .
      dockerfile: test.Dockerfile
    networks:
      - traefik

networks:
  traefik:
    external: true
